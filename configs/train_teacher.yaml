# ==========================================================

# YOLOv8 Teacher Training Config (FINAL - Research Grade)

# ==========================================================

# -------------------------

# Model

# -------------------------

model: yolov8m.pt
task: detect
pretrained: True

# -------------------------

# Dataset

# -------------------------

data: data/pcb_defect.yaml
imgsz: 640

# -------------------------

# Training

# -------------------------

epochs: 200
batch: 8
workers: 4
device: 0
patience: 50

# -------------------------

# Optimization

# -------------------------

optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

# -------------------------

# Warmup

# -------------------------

warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# -------------------------

# Loss Weights

# -------------------------

box: 7.5
cls: 0.5
dfl: 1.5

# -------------------------

# AUGMENTATION (DISABLED)

# -------------------------

hsv_h: 0.0
hsv_s: 0.0
hsv_v: 0.0

degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0

flipud: 0.0
fliplr: 0.0

mosaic: 0.0
mixup: 0.0

# -------------------------

# Validation

# -------------------------

val: True
plots: True
save_json: True          # Useful for detailed evaluation

# -------------------------

# Logging / Output

# -------------------------

project: experiments/teacher
name: yolov8m
exist_ok: False

# -------------------------

# Saving

# -------------------------

save: True
save_period: 20

# -------------------------

# Performance

# -------------------------

amp: True
cache: False
verbose: True

# -------------------------

# Reproducibility

# -------------------------

seed: 42
deterministic: True
